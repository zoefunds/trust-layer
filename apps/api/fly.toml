app = "trustlayer-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  APP_NAME = "TrustLayer API"
  DEBUG = "false"
  FRONTEND_URL = "https://trust-layer.vercel.app"
