version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trustlayer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trustlayer
      POSTGRES_USER: trustlayer
      POSTGRES_PASSWORD: trustlayer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustlayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: trustlayer-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env
    environment:
      - DATABASE_URL=postgresql://trustlayer:trustlayer_dev_password@postgres:5432/trustlayer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app

volumes:
  postgres_data:
